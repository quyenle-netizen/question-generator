<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Question JSON Generator</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>
  body {
    font-family: system-ui, -apple-system, Segoe UI, Roboto;
    background: #f1f5f9;
    padding: 20px;
    color: #0f172a;
  }

  h1 {
    font-size: 22px;
    margin-bottom: 16px;
  }

  .top-bar {
    margin-bottom: 16px;
  }

  select {
    padding: 8px;
    border-radius: 8px;
    border: 1px solid #cbd5e1;
  }

  .question {
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
  }

  .question h3 {
    margin-bottom: 10px;
  }

  label {
    font-weight: 600;
    display: block;
    margin-top: 10px;
    margin-bottom: 6px;
  }

  textarea {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #cbd5e1;
    box-sizing: border-box;
  }

  .choice-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
    padding: 6px 8px;
    border-radius: 8px;
    border: 1px solid #e2e8f0;
    background: #f8fafc;
  }

  .choice-row span {
    font-weight: bold;
    width: 20px;
  }

  button {
    margin-top: 10px;
    margin-right: 10px;
    padding: 10px 16px;
    border-radius: 10px;
    border: none;
    background: #2563eb;
    color: white;
    cursor: pointer;
    font-weight: 600;
  }

  button:hover {
    background: #1d4ed8;
  }

  #nextBtn {
    display: none;
    background: #16a34a;
  }

  #nextBtn:hover {
    background: #15803d;
  }

  pre {
    margin-top: 20px;
    background: #020617;
    color: #e2e8f0;
    padding: 16px;
    border-radius: 10px;
    white-space: pre-wrap;
  }

  .error {
    border-color: #ef4444 !important;
    background: #fef2f2 !important;
  }

  .error-text {
    color: #ef4444;
    font-size: 12px;
    margin-top: 4px;
  }
</style>
</head>

<body>

<h1>Question JSON Generator</h1>

<div class="top-bar">
  <label>Số lượng câu (2–5):</label>
  <select id="numQuestions" onchange="renderQuestions()">
    <option>2</option>
    <option>3</option>
    <option>4</option>
    <option selected>5</option>
  </select>
</div>

<div id="container"></div>

<button onclick="generate()">Generate JSON</button>
<button id="nextBtn" onclick="nextQuestion()">Next Question</button>

<pre id="output">// JSON sẽ hiện ở đây</pre>

<script>
function renderQuestions() {
  const num = document.getElementById("numQuestions").value;
  const container = document.getElementById("container");
  container.innerHTML = "";

  for (let i = 0; i < num; i++) {
    container.innerHTML += `
      <div class="question">
        <h3>Question ${i + 1}</h3>

        <label>Question Text</label>
        <textarea id="q${i}_text"></textarea>
        <div class="error-text" id="err_q${i}_text"></div>

        <label>Choices (click để chọn đáp án đúng)</label>

        ${["A","B","C","D"].map(letter => `
          <div class="choice-row">
            <input type="radio" name="q${i}_answer" value="${letter}">
            <span>${letter}</span>
            <div style="flex:1">
              <textarea id="q${i}_${letter}" placeholder="Choice ${letter}" rows="2"></textarea>
              <div class="error-text" id="err_q${i}_${letter}"></div>
            </div>
          </div>
        `).join("")}

        <div class="error-text" id="err_q${i}_answer"></div>
      </div>
    `;
  }
}

function clearErrors() {
  document.querySelectorAll(".error").forEach(el => el.classList.remove("error"));
  document.querySelectorAll(".error-text").forEach(el => el.textContent = "");
}

function setError(input, message) {
  input.classList.add("error");
  const err = document.getElementById("err_" + input.id);
  if (err) err.textContent = message;
}

function setAnswerError(i, message) {
  const err = document.getElementById(`err_q${i}_answer`);
  if (err) err.textContent = message;
}

function generate() {
  clearErrors();

  const num = document.getElementById("numQuestions").value;
  const questions = [];

  let hasError = false;
  let firstError = null;

  for (let i = 0; i < num; i++) {
    const textEl = document.getElementById(`q${i}_text`);
    const answerEl = document.querySelector(`input[name="q${i}_answer"]:checked`);

    if (!textEl.value.trim()) {
      setError(textEl, "Required");
      hasError = true;
      if (!firstError) firstError = textEl;
    }

    if (!answerEl) {
      setAnswerError(i, "Please select correct answer");
      hasError = true;
    }

    const choices = [];

    ["A","B","C","D"].forEach(letter => {
      const input = document.getElementById(`q${i}_${letter}`);
      const value = input.value.trim();

      if (!value) {
        setError(input, "Required");
        hasError = true;
        if (!firstError) firstError = input;
      }

      choices.push({
        label: letter,
        text: value
      });
    });

    questions.push({
      answer: answerEl ? answerEl.value : "",
      text: textEl.value.trim(),
      choices
    });
  }

  if (hasError) {
    firstError.scrollIntoView({ behavior: "smooth", block: "center" });
    return;
  }

  document.getElementById("output").textContent =
    JSON.stringify(questions, null, 2);

  document.getElementById("nextBtn").style.display = "inline-block";
}

function nextQuestion() {
  renderQuestions();
  clearErrors();

  document.getElementById("output").textContent = "// JSON sẽ hiện ở đây";
  document.getElementById("nextBtn").style.display = "none";

  window.scrollTo({
    top: 0,
    behavior: "smooth"
  });
}

renderQuestions();
</script>

</body>
</html>
